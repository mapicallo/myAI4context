<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myContext - Configurar perfil</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 myContext</h1>
            <p>Configura tu documento de contexto para IAs</p>
        </div>

        <div class="wizard">
            <div class="steps-indicator">
                <div class="step active" data-step="1">1. Identidad</div>
                <div class="step" data-step="2">2. Descripción</div>
                <div class="step" data-step="3">3. Enlaces</div>
                <div class="step" data-step="4">4. Reglas</div>
            </div>

            <div class="wizard-content">
                <!-- Step 1: Identity -->
                <div class="step-content active" id="step1">
                    <h2>Identidad</h2>
                    <div class="form-group">
                        <label for="profileName">Nombre o título</label>
                        <input type="text" id="profileName" placeholder="Tu nombre, nombre de empresa u organización">
                    </div>
                    <div class="form-group">
                        <label for="profileType">Tipo</label>
                        <select id="profileType">
                            <option value="person">Persona</option>
                            <option value="company">Empresa</option>
                            <option value="organization">Organización</option>
                        </select>
                    </div>
                </div>

                <!-- Step 2: Bio -->
                <div class="step-content" id="step2">
                    <h2>Descripción</h2>
                    <div class="form-group">
                        <label for="profileBio">Bio / Descripción</label>
                        <textarea id="profileBio" rows="6" placeholder="Quién eres, qué haces, qué quieres que la IA sepa de ti o de tu organización..."></textarea>
                    </div>
                </div>

                <!-- Step 3: Links -->
                <div class="step-content" id="step3">
                    <h2>Enlaces</h2>
                    <p class="section-hint">Añade tus enlaces oficiales (LinkedIn, web, email, etc.)</p>
                    <div id="linksContainer"></div>
                    <button type="button" id="addLink" class="btn btn-outline">+ Añadir enlace</button>
                </div>

                <!-- Step 4: Rules -->
                <div class="step-content" id="step4">
                    <h2>Reglas (opcional)</h2>
                    <div class="form-group">
                        <label for="profileRules">Qué puede y no puede decir la IA</label>
                        <textarea id="profileRules" rows="4" placeholder="Ej: No inventar datos que no estén aquí. Solo responder basándose en esta información. No dar opiniones políticas..."></textarea>
                    </div>
                </div>
            </div>

            <div class="wizard-actions">
                <button type="button" id="prevStep" class="btn btn-secondary" disabled>Anterior</button>
                <button type="button" id="nextStep" class="btn btn-primary">Siguiente</button>
                <button type="button" id="saveProfile" class="btn btn-primary" style="display: none;">Guardar</button>
            </div>
        </div>

        <div id="statusMessage" class="status-message" style="display: none;"></div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
