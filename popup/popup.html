<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myContext</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">📄</span>
                <h1>myContext</h1>
            </div>
            <p class="subtitle">AI Context Document</p>
        </div>

        <div class="content">
            <div id="noProfile" class="state-message">
                <p>No tienes un perfil configurado.</p>
                <p class="hint">Configura tu perfil para generar tu documento de contexto.</p>
                <button id="openSettings" class="btn btn-primary">Configurar perfil</button>
            </div>

            <div id="hasProfile" class="state-message" style="display: none;">
                <p>Tu perfil está listo.</p>
                <div class="actions">
                    <button id="downloadJson" class="btn btn-secondary">Descargar JSON</button>
                    <button id="downloadMd" class="btn btn-secondary">Descargar Markdown</button>
                    <button id="openSettingsFromProfile" class="btn btn-outline">Editar perfil</button>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
