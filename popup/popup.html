<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myAI4context</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-row">
                <div class="logo">
                    <span class="logo-icon">📄</span>
                    <h1>myAI4context</h1>
                </div>
                <div class="language-selector">
                    <label for="languageSelect" id="languageLabel">Idioma</label>
                    <select id="languageSelect" aria-label="Idioma">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
            <p class="subtitle" id="subtitle">AI Context Document</p>
        </div>

        <div class="content">
            <div id="noProfiles" class="state-message">
                <p data-i18n="noProfile">No tienes perfiles configurados.</p>
                <p class="hint" data-i18n="noProfileHint">Crea tu primer perfil para generar tu documento de contexto.</p>
                <button id="newProfile" class="btn btn-primary" data-i18n="newProfile">Nuevo perfil</button>
            </div>

            <div id="profilesList" class="profiles-list" style="display: none;">
                <div id="profilesContainer"></div>
                <button id="newProfileFromList" class="btn btn-outline btn-full" data-i18n="newProfile">+ Nuevo perfil</button>
            </div>
        </div>

        <div class="footer">
            <a href="https://ai4context.com" target="_blank" rel="noopener">ai4context.com</a>
            <span class="footer-attribution">© 2025 Manuel Angel Picallo Pérez</span>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="popup.js"></script>
</body>
</html>
